name: Python Course Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check-course:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run course
        run: python run_all.py
